name: Run Pishi CRM Agent

on:
  schedule:
    # Runs every day at 08:00 UTC (9:00 AM Central European Time)
    - cron: '0 8 * * *'
  workflow_dispatch:
    # Allows you to manually trigger the run from the Actions tab anytime

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Recreate Service Account Key
      run: |
        echo '${{ secrets.GCP_SERVICE_ACCOUNT }}' > service_account.json

    - name: Run Agent
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: python agent_logic.py
